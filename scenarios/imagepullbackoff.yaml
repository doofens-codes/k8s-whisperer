apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-image-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: missing-image
  template:
    metadata:
      labels:
        app: missing-image
    spec:
      containers:
      - name: oops-container
        # This image tag deliberately does not exist on DockerHub
        image: nginx:this-tag-does-not-exist-12345
        ports:
        - containerPort: 80
